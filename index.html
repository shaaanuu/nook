<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>startpage</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="container">
        <div class="datetime-container">
            <div class="datetime" id="current-time"></div>
        </div>

        <div class="search-container">
            <form id="search-form">
                <input type="text" id="search-input" class="search-input" placeholder="Search the web..."
                    autocomplete="off">
            </form>
        </div>

        <div class="sites-container">
            <div class="category">
                <h3 class="category-title">Artificial Brains</h3>
                <div class="category-strip">
                    <a href="https://chat.openai.com" class="site-link">ChatGPT</a>
                    <a href="https://chat.qwen.ai" class="site-link">Qwen</a>
                    <a href="https://gemini.google.com" class="site-link">Gemini</a>
                    <a href="https://claude.ai" class="site-link">Claude</a>
                    <a href="https://wikipedia.org" class="site-link">Wikipedia</a>
                </div>
            </div>

            <div class="category">
                <h3 class="category-title">Tinkerers</h3>
                <div class="category-strip">
                    <a href="https://github.com" class="site-link">GitHub</a>
                    <a href="https://search.nixos.org" class="site-link">Nix pkgs</a>
                    <a href="https://netlify.com" class="site-link">Netlify</a>
                </div>
            </div>

            <div class="category">
                <h3 class="category-title">Messengers</h3>
                <div class="category-strip">
                    <a href="https://web.whatsapp.com" class="site-link">WhatsApp</a>
                    <a href="https://web.telegram.org" class="site-link">Telegram</a>
                    <a href="https://gmail.com" class="site-link">Gmail</a>
                </div>
            </div>

            <div class="category">
                <h3 class="category-title">Artisans</h3>
                <div class="category-strip">
                    <a href="https://figma.com" class="site-link">Figma</a>
                    <a href="https://canva.com" class="site-link">Canva</a>
                </div>
            </div>

            <div class="category">
                <h3 class="category-title">Procrastinators</h3>
                <div class="category-strip">
                    <a href="https://reddit.com" class="site-link">Reddit</a>
                    <a href="https://music.youtube.com" class="site-link">YT Music</a>
                    <a href="https://instagram.com" class="site-link">Instagram</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Display current time and date
        // TODO: move to js file.
        function showTime() {
            const now = new Date();
            const timeElement = document.getElementById('current-time');

            timeElement.textContent = now.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
        showTime();
    </script>
</body>

</html>
